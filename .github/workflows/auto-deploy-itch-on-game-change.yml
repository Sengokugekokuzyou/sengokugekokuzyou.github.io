name: Auto deploy itch.io on game change

on:
  schedule:
    - cron: '25 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      GAME_REPO: Sengokugekokuzyou/sengoku-blood-
      ITCH_TARGET: sengokugekokujobeats/kekkanokeifu
      ITCH_CHANNEL: html5
      STATE_FILE: .deploy-state/sengoku-blood-.sha
    steps:
      - name: Checkout official site repository
        uses: actions/checkout@v4
        with:
          path: site

      - name: Checkout game repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GAME_REPO }}
          path: game

      - name: Check whether game changed
        id: change
        run: |
          current_sha="$(git -C game rev-parse HEAD)"
          previous_sha=""
          if [ -f "site/$STATE_FILE" ]; then
            previous_sha="$(cat "site/$STATE_FILE" | tr -d '[:space:]')"
          fi
          echo "current_sha=$current_sha" >> "$GITHUB_OUTPUT"
          echo "previous_sha=$previous_sha" >> "$GITHUB_OUTPUT"
          if [ "$current_sha" = "$previous_sha" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new game commit to deploy."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New game commit detected: $current_sha"
          fi

      - name: Prepare HTML5 release folder
        if: steps.change.outputs.changed == 'true'
        run: |
          mkdir -p release
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='docs' \
            game/ release/
          test -f release/index.html

      - name: Setup butler
        if: steps.change.outputs.changed == 'true'
        uses: itchio/setup-butler@v1

      - name: Upload to itch.io
        if: steps.change.outputs.changed == 'true'
        run: |
          if [ -z "$BUTLER_API_KEY" ]; then
            echo "BUTLER_API_KEY is not set. Add it as a repository secret."
            exit 1
          fi
          version="auto-${{ steps.change.outputs.current_sha }}"
          version="${version:0:17}"
          butler push release "$ITCH_TARGET:$ITCH_CHANNEL" --userversion "$version" --if-changed

      - name: Update HP news, devlog draft, and deployed state
        if: steps.change.outputs.changed == 'true'
        working-directory: site
        env:
          CURRENT_SHA: ${{ steps.change.outputs.current_sha }}
          PREVIOUS_SHA: ${{ steps.change.outputs.previous_sha }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const now = new Date().toISOString().slice(0, 10);
          const currentSha = process.env.CURRENT_SHA;
          const previousSha = process.env.PREVIOUS_SHA || '';
          const shortSha = currentSha.slice(0, 7);
          const title = `血華の系譜を自動更新しました`;
          const commitUrl = `https://github.com/${process.env.GAME_REPO}/commit/${currentSha}`;
          const gameUrl = 'https://sengokugekokujobeats.itch.io/kekkanokeifu';
          let summary = `ゲーム本体の新しいコミット ${shortSha} を検知し、itch.ioへ自動アップロードしました。`;

          try {
            if (previousSha) {
              const log = execSync(`git -C ../game log --oneline ${previousSha}..${currentSha}`, { encoding: 'utf8' }).trim();
              if (log) summary = `ゲーム本体を更新しました。変更: ${log.split('\n').slice(0, 3).join(' / ')}`;
            }
          } catch (error) {
            console.log('Could not build commit summary; using fallback text.');
          }

          const news = JSON.parse(fs.readFileSync('news.json', 'utf8'));
          const updates = Array.isArray(news.updates) ? news.updates : [];
          const id = `itch-auto-${shortSha}`;
          const item = {
            id,
            date: now,
            category: 'itch.io自動更新',
            title,
            body: summary,
            url: gameUrl,
            approved: true,
            discord: true,
            source: 'itch-auto',
            commit: commitUrl
          };
          news.updates = [item, ...updates.filter((entry) => entry.id !== id)];
          fs.writeFileSync('news.json', `${JSON.stringify(news, null, 2)}\n`, 'utf8');

          fs.mkdirSync('devlogs', { recursive: true });
          const devlog = [
            `# ${title}`,
            '',
            `公開日: ${now}`,
            `対象コミット: ${commitUrl}`,
            `itch.io: ${gameUrl}`,
            '',
            '## 更新内容',
            '',
            summary,
            '',
            '## 公開メモ',
            '',
            '- HPとDiscordには自動反映済み。',
            '- itch.ioのDeveloper Logsへ投稿する場合は、この内容を確認して貼り付ける。',
            ''
          ].join('\n');
          fs.writeFileSync(path.join('devlogs', `${id}.md`), devlog, 'utf8');
          fs.mkdirSync('.deploy-state', { recursive: true });
          fs.writeFileSync(process.env.STATE_FILE, `${currentSha}\n`, 'utf8');
          NODE

      - name: Commit automation results
        if: steps.change.outputs.changed == 'true'
        working-directory: site
        run: |
          if git diff --quiet -- news.json devlogs "$STATE_FILE"; then
            echo "No site changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json devlogs "$STATE_FILE"
          git commit -m "Auto log itch.io deployment"
          git push
