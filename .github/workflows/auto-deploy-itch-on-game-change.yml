name: Auto deploy itch.io on game changes (stopped)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stopped:
    runs-on: ubuntu-latest
    steps:
      - name: Auto upload stopped
        run: |
          echo "itch.io auto upload is stopped by project policy."
          echo "Build outputs must be placed in 更新出力/最新フォルダ and C:\\Users\\kurai\\Documents\\外出先用."
          echo "C:\\Users\\kurai\\Documents\\外出先用 must also include the itch.io devlog update text."
