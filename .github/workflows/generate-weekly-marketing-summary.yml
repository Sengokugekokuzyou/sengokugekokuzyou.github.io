name: Generate weekly marketing summary

on:
  schedule:
    - cron: '0 14 * * 6'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate weekly marketing summary
        id: generate_summary
        continue-on-error: true
        env:
          SITE_URL: https://sengokugekokuzyou.github.io
          SUMMARY_DAYS: '7'
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          SEARCH_CONSOLE_SITE_URL: ${{ secrets.SEARCH_CONSOLE_SITE_URL }}
        run: node .github/scripts/generate-weekly-marketing-summary.mjs

      - name: Report summary result
        run: |
          if [ "${{ steps.generate_summary.outcome }}" = "success" ]; then
            echo "Marketing summary generated."
          else
            echo "Marketing summary generation needs attention, but notification spam is suppressed."
          fi

      - name: Post marketing summary to Discord
        if: steps.generate_summary.outcome == 'success'
        continue-on-error: true
        env:
          MARKETING_SUMMARY_DISCORD_WEBHOOK_URL: ${{ secrets.MARKETING_SUMMARY_DISCORD_WEBHOOK_URL }}
        run: node .github/scripts/post-marketing-summary-to-discord.mjs
