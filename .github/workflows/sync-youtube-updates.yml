name: Sync YouTube updates

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-youtube-updates.yml'
      - '.github/scripts/sync-youtube-updates.mjs'

concurrency:
  group: sync-youtube-updates
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync YouTube feed to news.json
        env:
          YOUTUBE_CHANNEL_ID: ${{ vars.YOUTUBE_CHANNEL_ID || 'UChtURL_MY58O7nfhmaYOMaw' }}
          YOUTUBE_CHANNEL_HANDLE: ${{ vars.YOUTUBE_CHANNEL_HANDLE || '@戦国下剋上BEATS' }}
        run: node .github/scripts/sync-youtube-updates.mjs

      - name: Commit news updates
        run: |
          if git diff --quiet -- news.json; then
            echo "No news.json changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "Sync YouTube updates"
          git push

      - name: Post YouTube update to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ ! -f youtube-discord-payload.json ]; then
            echo "No YouTube Discord payload file. Skipping."
            exit 0
          fi
          if grep -q '"skip": true' youtube-discord-payload.json; then
            echo "No new YouTube update for Discord. Skipping."
            exit 0
          fi
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set. Skipping Discord post."
            exit 0
          fi
          curl -f -sS -H "Content-Type: application/json" -d @youtube-discord-payload.json "$DISCORD_WEBHOOK_URL"
